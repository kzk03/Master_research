services:
  app:
    container_name: irl_dir_v2
    image: irl_dir_v2
    deploy:
      resources:
        limits:
          cpus: '20'
    build:
      context: .
      args:
        UID: ${UID}
        GID: ${GID}
        USERNAME: ${USERNAME}
    volumes:
      - ./:/app/
    stdin_open: true
    tty: true